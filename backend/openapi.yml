openapi: 3.0.3
info:
    title: Government Project Management API
    version: 1.0.0
    description: API contract for project lifecycle, RBAC-protected endpoints

servers:
    - url: https://api.example.gov

components:
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT

    schemas:
        User:
            type: object
            properties:
                id:
                    type: integer
                username:
                    type: string
                email:
                    type: string

paths:
    /auth/login:
        post:
            summary: Login
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                username:
                                    type: string
                                password:
                                    type: string
            responses:
                "200":
                    description: tokens

    /auth/refresh:
        post:
            summary: Refresh access token (rotation)
            security:
                - bearerAuth: []
            responses:
                "200":
                    description: new tokens

    /users:
        get:
            summary: List users (RBAC protected)
            security:
                - bearerAuth: []
            parameters:
                - in: query
                  name: department_id
                  schema:
                      type: integer
            responses:
                "200":
                    description: list

    /projects:
        post:
            summary: Create project (initial stage concept proposal)
            security:
                - bearerAuth: []
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            required: [title, department_id]
            responses:
                "201":
                    description: created

    /projects/{projectId}/transition:
        post:
            summary: Transition project to next stage (state-machine enforced)
            security:
                - bearerAuth: []
            parameters:
                - in: path
                  name: projectId
                  required: true
                  schema:
                      type: integer
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                target_stage:
                                    type: string
                                comments:
                                    type: string
                                idempotency_key:
                                    type: string
            responses:
                "200":
                    description: transition recorded

    /projects/{projectId}/rag:
        get:
            summary: Get RAG status and history
            security:
                - bearerAuth: []
            parameters:
                - in: path
                  name: projectId
                  required: true
                  schema:
                      type: integer
            responses:
                "200":
                    description: rag payload

    /documents/upload:
        post:
            summary: Upload document (multipart)
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            properties:
                                project_id:
                                    type: integer
                                file:
                                    type: string
                                    format: binary
            responses:
                "201":
                    description: uploaded

security:
    - bearerAuth: []
